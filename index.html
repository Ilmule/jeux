<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAND PALACE - Casino Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="notify">Message</div>

<!-- ECRAN DE DEMARRAGE -->
<div id="scr-start">
    <div class="start-box">
        <h1 style="color:var(--primary); letter-spacing: 5px; margin-top:0;">GRAND PALACE</h1>
        <p>Entrez votre capital de départ :</p>
        <input type="number" id="start-bal" value="1000" style="margin-bottom: 20px; width: 150px;">
        <br>
        <button onclick="bootGame()" style="width: 100%;">ENTRER DANS LE CASINO</button>
    </div>
</div>

<!-- LOBBY PRINCIPAL -->
<div id="scr-main" class="hidden" style="width: 100%; flex: 1;">
    <header>
        <button id="btn-back" class="hidden" onclick="showLobby()" style="background:transparent; color:var(--primary); border:1px solid var(--primary)">← LOBBY</button>
        <div id="balance-display" style="font-size: 1.5rem; font-weight: bold;">0 €</div>
    </header>

    <div class="container">
        <div id="lobby" class="lobby-grid">
            <div class="card" onclick="openGame('bj')"><i>🃏</i>Blackjack</div>
            <div class="card" onclick="openGame('mines')"><i>💣</i>Mines</div>
            <div class="card" onclick="openGame('roulette')"><i>🎡</i>Roulette</div>
            <div class="card" onclick="openGame('crash')"><i>🚀</i>Crash</div>
            <div class="card" onclick="openGame('slots')"><i>🎰</i>Slots</div>
            <div class="card" onclick="openGame('plinko')"><i>🎾</i>Plinko</div>
            <div class="card" onclick="openGame('poker')"><i>💎</i>Poker</div>
            <div class="card" onclick="openGame('dice')"><i>🎲</i>Dés</div>
            <div class="card" onclick="openGame('hilo')"><i>📈</i>Hi-Lo</div>
            <div class="card" onclick="openGame('baccarat')"><i>💰</i>Baccarat</div>
        </div>

        <div id="game-container" class="hidden">
            <div id="game-screen" class="game-view"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
